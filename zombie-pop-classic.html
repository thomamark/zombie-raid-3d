<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Zombie Pop!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #7ec8e3; touch-action: none; overscroll-behavior: none; }
  #game { display: block; width: 100vw; height: 100vh; }
  #hint {
    position: fixed; left: 0; right: 0; bottom: env(safe-area-inset-bottom, 12px);
    text-align: center; font-family: -apple-system, "Comic Sans MS", "Trebuchet MS", sans-serif;
    color: #fff; font-size: 4vw; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,.35);
    pointer-events: none; opacity: .9;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hint">Tap the zombies! 👆</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 3);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- Simple happy sound (WebAudio, no files needed) ----
  let ac = null;
  function beep(freq, dur, type) {
    try {
      if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
      if (ac.state === 'suspended') ac.resume();
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = type || 'sine'; o.frequency.value = freq;
      o.connect(g); g.connect(ac.destination);
      const t = ac.currentTime;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.25, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t); o.stop(t + dur + 0.02);
    } catch (e) {}
  }
  function popSound() { beep(700, 0.12, 'triangle'); setTimeout(() => beep(1000, 0.12, 'sine'), 70); }
  function ouchSound() { beep(180, 0.25, 'sawtooth'); }
  function cheer() { [523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'triangle'), i*90)); }

  // ---- Game state ----
  let zombies = [];
  let bursts = [];
  let score = 0;
  let hearts = 3;
  let spawnTimer = 0;
  let spawnEvery = 1500;    // ms between zombies (gets faster)
  let speedBase = 0.018;    // fraction of screen height per second
  let elapsed = 0;
  let gameOver = false;
  let started = false;

  const ZCOLORS = ['#6fcf6f', '#8ed08e', '#5fb85f', '#7bc47b'];

  function reset() {
    zombies = []; bursts = []; score = 0; hearts = 3;
    spawnTimer = 0; spawnEvery = 1500; elapsed = 0; gameOver = false;
  }

  function spawn() {
    const r = Math.min(W, H) * (0.085 + Math.random() * 0.03);
    zombies.push({
      x: r + Math.random() * (W - 2 * r),
      y: -r,
      r,
      speed: (speedBase + Math.random() * 0.006) * H,
      wob: Math.random() * Math.PI * 2,
      color: ZCOLORS[(Math.random() * ZCOLORS.length) | 0],
      dead: false
    });
  }

  function popZombie(z) {
    z.dead = true;
    score++;
    popSound();
    for (let i = 0; i < 14; i++) {
      const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 4;
      bursts.push({
        x: z.x, y: z.y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2,
        r: 4 + Math.random() * 6, life: 1, color: z.color
      });
    }
  }

  function hitAt(px, py) {
    if (gameOver) { reset(); return; }
    started = true;
    // topmost (closest) zombie first
    for (let i = zombies.length - 1; i >= 0; i--) {
      const z = zombies[i];
      if (z.dead) continue;
      const dx = px - z.x, dy = py - z.y;
      if (dx * dx + dy * dy <= (z.r * 1.15) * (z.r * 1.15)) { popZombie(z); return; }
    }
  }

  // ---- Input (touch + mouse) ----
  function pt(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const rect = canvas.getBoundingClientRect();
      hitAt(t.clientX - rect.left, t.clientY - rect.top);
    }
  }, { passive: false });
  canvas.addEventListener('mousedown', (e) => { const p = pt(e); hitAt(p.x, p.y); });

  // ---- Drawing ----
  function drawZombie(z, t) {
    const wob = Math.sin(t / 250 + z.wob) * z.r * 0.12;
    ctx.save();
    ctx.translate(z.x + wob, z.y);
    // body/head
    ctx.fillStyle = z.color;
    ctx.beginPath();
    ctx.arc(0, 0, z.r, 0, Math.PI * 2);
    ctx.fill();
    // darker patch (silly)
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.beginPath();
    ctx.ellipse(-z.r * 0.3, -z.r * 0.35, z.r * 0.35, z.r * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();
    // eyes (big and googly)
    const eo = z.r * 0.38, ey = -z.r * 0.15, er = z.r * 0.26;
    for (const sx of [-1, 1]) {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(sx * eo, ey, er, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(sx * eo + Math.sin(t/300)*er*0.3, ey + er*0.15, er * 0.45, 0, Math.PI * 2); ctx.fill();
    }
    // silly grin
    ctx.strokeStyle = '#2a5a2a'; ctx.lineWidth = z.r * 0.12; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(0, z.r * 0.28, z.r * 0.42, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
    // little teeth
    ctx.fillStyle = '#fff';
    ctx.fillRect(-z.r * 0.18, z.r * 0.36, z.r * 0.14, z.r * 0.14);
    ctx.fillRect(z.r * 0.06, z.r * 0.36, z.r * 0.14, z.r * 0.14);
    ctx.restore();
  }

  function drawHouse() {
    const hw = Math.min(W, H) * 0.16, hx = W / 2, hy = H - hw * 0.55;
    ctx.save();
    ctx.translate(hx, hy);
    // walls
    ctx.fillStyle = '#f6d186';
    ctx.fillRect(-hw/2, -hw*0.35, hw, hw*0.7);
    // roof
    ctx.fillStyle = '#e57373';
    ctx.beginPath();
    ctx.moveTo(-hw*0.62, -hw*0.35); ctx.lineTo(0, -hw*0.8); ctx.lineTo(hw*0.62, -hw*0.35); ctx.closePath();
    ctx.fill();
    // door
    ctx.fillStyle = '#8d6e63';
    ctx.fillRect(-hw*0.12, hw*0.05, hw*0.24, hw*0.3);
    ctx.restore();
  }

  function drawHearts() {
    const s = Math.min(W, H) * 0.05;
    for (let i = 0; i < 3; i++) {
      const x = 16 + i * (s + 8) + s/2, y = 16 + s/2 + (window.__safeTop||0);
      ctx.save(); ctx.translate(x, y); ctx.scale(s/24, s/24);
      ctx.fillStyle = i < hearts ? '#ff5a7a' : 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.moveTo(0, 6);
      ctx.bezierCurveTo(-12, -6, -12, -16, 0, -8);
      ctx.bezierCurveTo(12, -16, 12, -6, 0, 6);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawScore() {
    ctx.fillStyle = '#fff';
    ctx.font = '800 ' + Math.min(W,H)*0.07 + 'px -apple-system, "Comic Sans MS", sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'top';
    ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 2;
    ctx.fillText('⭐ ' + score, W - 16, 14);
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  }

  function drawBackground() {
    // sky gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#8fd3f4'); g.addColorStop(1, '#bfe9c9');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    // grass
    ctx.fillStyle = '#8bc34a';
    ctx.fillRect(0, H * 0.82, W, H * 0.18);
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '800 ' + Math.min(W,H)*0.11 + 'px -apple-system, "Comic Sans MS", sans-serif';
    ctx.fillText('You got ⭐ ' + score + '!', W/2, H*0.42);
    ctx.font = '800 ' + Math.min(W,H)*0.06 + 'px -apple-system, "Comic Sans MS", sans-serif';
    ctx.fillText('Tap to play again 🔁', W/2, H*0.56);
  }

  // ---- Loop ----
  let last = performance.now();
  function frame(now) {
    const dt = Math.min(50, now - last); last = now;
    const hint = document.getElementById('hint');

    drawBackground();
    drawHouse();

    if (started && !gameOver) {
      elapsed += dt;
      hint.style.opacity = 0;
      // difficulty ramps very gently
      spawnEvery = Math.max(700, 1500 - elapsed / 60);
      speedBase = 0.018 + Math.min(0.02, elapsed / 900000);

      spawnTimer += dt;
      if (spawnTimer >= spawnEvery) { spawnTimer = 0; spawn(); }

      for (const z of zombies) {
        if (z.dead) continue;
        z.y += z.speed * (dt / 1000);
        if (z.y - z.r > H * 0.8) {
          z.dead = true; z.reached = true;
          hearts--; ouchSound();
          if (hearts <= 0) { gameOver = true; ouchSound(); }
        }
      }
    }

    // draw + cleanup zombies
    for (const z of zombies) if (!z.dead) drawZombie(z, now);
    zombies = zombies.filter(z => !z.dead);

    // bursts
    for (const b of bursts) {
      b.x += b.vx; b.y += b.vy; b.vy += 0.35; b.life -= dt / 600;
      ctx.globalAlpha = Math.max(0, b.life);
      ctx.fillStyle = b.color;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    bursts = bursts.filter(b => b.life > 0);

    drawScore();
    drawHearts();

    if (!started) {
      ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = '800 ' + Math.min(W,H)*0.12 + 'px -apple-system, "Comic Sans MS", sans-serif';
      ctx.fillText('Zombie Pop! 🧟', W/2, H*0.4);
      ctx.font = '800 ' + Math.min(W,H)*0.06 + 'px -apple-system, "Comic Sans MS", sans-serif';
      ctx.fillText('Tap a zombie to start 👆', W/2, H*0.54);
    }

    if (gameOver) { hint.style.opacity = 0; drawGameOver(); }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // start the audio context on first touch (iOS requirement)
  window.addEventListener('touchstart', () => { if (ac && ac.state === 'suspended') ac.resume(); }, { once: false });
})();
</script>
</body>
</html>
