<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Zombie Raid 3D</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; touch-action:none;
    user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
  canvas { display:block; }

  .hudtext { color:#fff; font-weight:900;
    text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 3px 6px rgba(0,0,0,.5); }

  #hearts { position:fixed; top:calc(10px + env(safe-area-inset-top)); left:calc(14px + env(safe-area-inset-left));
    font-size:30px; letter-spacing:2px; z-index:10; pointer-events:none; }
  #waveLabel { position:fixed; top:calc(10px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-size:26px; z-index:10; pointer-events:none; }
  #score { position:fixed; top:calc(10px + env(safe-area-inset-top)); right:calc(16px + env(safe-area-inset-right));
    font-size:30px; z-index:10; pointer-events:none; }

  #crosshair { position:fixed; left:50%; top:50%; width:10px; height:10px; margin:-5px 0 0 -5px;
    border-radius:50%; background:rgba(255,255,255,.85); box-shadow:0 0 0 2px rgba(0,0,0,.35);
    z-index:9; pointer-events:none; }

  #banner { position:fixed; left:0; right:0; top:26%; text-align:center; font-size:52px; z-index:11;
    pointer-events:none; opacity:0; }
  #pauseLabel { position:fixed; left:0; right:0; top:38%; text-align:center; z-index:13;
    font-size:44px; pointer-events:none; display:flex; flex-direction:column; align-items:center; gap:6px; }
  #pauseLabel span { font-size:18px; opacity:.85; }
  #banner.show { animation: bannerPop 1.9s ease-out forwards; }
  @keyframes bannerPop {
    0% { opacity:0; transform:scale(.3); }
    12% { opacity:1; transform:scale(1.15); }
    20% { transform:scale(1); }
    80% { opacity:1; }
    100% { opacity:0; transform:scale(1.05); }
  }

  #weaponbar { position:fixed; bottom:calc(12px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    display:flex; gap:6px; z-index:12; flex-wrap:wrap; justify-content:center;
    max-width:calc(100vw - 16px); }
  .wbtn { width:44px; height:44px; border-radius:12px; border:3px solid rgba(255,255,255,.5);
    background:rgba(0,0,0,.45); font-size:22px; line-height:1; color:#fff; position:relative;
    display:flex; align-items:center; justify-content:center; }
  .ammo { position:absolute; bottom:0px; right:2px; font-size:10px; font-weight:900; color:#fff;
    text-shadow:0 1px 2px #000, 0 0 3px #000; }
  .ammo.empty { color:#ff7766; }
  .wbtn.sel { border-color:#ffd54a; background:rgba(80,60,0,.55); box-shadow:0 0 14px rgba(255,213,74,.8); }
  .wbtn.locked { opacity:.35; filter:grayscale(1); }

  #stick { position:fixed; width:130px; height:130px; border-radius:50%;
    background:rgba(255,255,255,.10); border:2px solid rgba(255,255,255,.35);
    z-index:8; display:none; pointer-events:none; }
  #knob { position:absolute; width:56px; height:56px; border-radius:50%; left:37px; top:37px;
    background:rgba(255,255,255,.45); border:2px solid rgba(255,255,255,.6); }

  #fireBtn { position:fixed; right:calc(26px + env(safe-area-inset-right)); bottom:calc(86px + env(safe-area-inset-bottom));
    width:96px; height:96px; border-radius:50%; border:4px solid rgba(255,255,255,.6);
    background:radial-gradient(circle at 35% 30%, rgba(255,120,80,.95), rgba(200,40,30,.9));
    font-size:44px; z-index:12; display:none; box-shadow:0 4px 14px rgba(0,0,0,.5); }
  #fireBtn:active { transform:scale(.92); }

  #jumpBtn { position:fixed; right:calc(44px + env(safe-area-inset-right)); bottom:calc(196px + env(safe-area-inset-bottom));
    width:64px; height:64px; border-radius:50%; border:3px solid rgba(255,255,255,.6);
    background:radial-gradient(circle at 35% 30%, rgba(120,200,255,.95), rgba(30,90,200,.9));
    font-size:28px; z-index:12; display:none; box-shadow:0 4px 12px rgba(0,0,0,.5); }
  #jumpBtn:active { transform:scale(.92); }

  #lookstick { position:fixed; right:calc(136px + env(safe-area-inset-right)); bottom:calc(24px + env(safe-area-inset-bottom));
    width:120px; height:120px; border-radius:50%;
    background:rgba(120,180,255,.12); border:2px solid rgba(160,200,255,.4);
    z-index:11; display:none; }
  #lookknob { position:absolute; width:52px; height:52px; border-radius:50%; left:34px; top:34px;
    background:rgba(160,200,255,.5); border:2px solid rgba(200,225,255,.7); pointer-events:none; }
  #lookstick::after { content:'👀'; position:absolute; top:-26px; left:50%; transform:translateX(-50%);
    font-size:16px; opacity:.7; }

  #adminBtn { position:fixed; top:calc(52px + env(safe-area-inset-top)); right:calc(16px + env(safe-area-inset-right));
    width:42px; height:42px; border-radius:12px; border:2px solid rgba(255,255,255,.35);
    background:rgba(0,0,0,.4); font-size:20px; z-index:25; opacity:.65; }
  #adminPanel { position:fixed; top:calc(102px + env(safe-area-inset-top)); right:calc(16px + env(safe-area-inset-right));
    display:flex; flex-direction:column; gap:8px; z-index:25; }
  .adbtn { min-width:150px; padding:10px 14px; border-radius:12px; border:2px solid rgba(255,255,255,.45);
    background:rgba(10,10,30,.75); color:#fff; font-size:15px; font-weight:800; text-align:left; }
  .adbtn.on { border-color:#7fff6a; background:rgba(20,80,20,.8); }

  #redflash { position:fixed; inset:0; background:radial-gradient(circle, rgba(255,0,0,0) 40%, rgba(255,0,0,.55) 100%);
    opacity:0; z-index:20; pointer-events:none; transition:opacity .12s; }

  #overlay { position:fixed; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; text-align:center;
    overflow-y:auto; padding:20px 0;
    background:radial-gradient(circle at 50% 40%, rgba(20,10,40,.55), rgba(5,2,15,.82)); }
  #overlay h1 { font-size:min(11vw, 64px); }
  #overlay .sub { font-size:min(4.5vw, 22px); max-width:80%; line-height:1.5; }
  #overlay .big { font-size:min(7vw, 40px); }
  #playBtn { margin-top:10px; font-size:min(7vw, 34px); font-weight:900; color:#fff;
    padding:18px 54px; border-radius:60px; border:4px solid #fff;
    background:linear-gradient(180deg, #59c94f, #2e8b2e); box-shadow:0 6px 20px rgba(0,0,0,.6);
    text-shadow:0 2px 4px rgba(0,0,0,.5); }
  #playBtn:active { transform:scale(.95); }
  .hidden { display:none !important; }

  #maprow { display:flex; gap:10px; }
  .mbtn { width:76px; height:74px; border-radius:14px; border:3px solid rgba(255,255,255,.45);
    background:rgba(0,0,0,.4); color:#fff; font-size:24px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:1px; }
  .mbtn.sel { border-color:#ffd54a; box-shadow:0 0 12px rgba(255,213,74,.7); }
  .mbtn.locked { opacity:.45; filter:grayscale(.8); }
  .mlabel { font-size:10px; font-weight:800; }
  .mdiff { font-size:9px; letter-spacing:1px; }
  #board { background:rgba(0,0,0,.35); padding:10px 20px; border-radius:14px; min-width:280px; font-size:15px; }
  #miniboard { position:fixed; top:calc(52px + env(safe-area-inset-top)); left:calc(14px + env(safe-area-inset-left));
    font-size:13px; z-index:9; pointer-events:none; opacity:.9; }
  #metaRow { display:flex; flex-direction:column; gap:14px; align-items:center; justify-content:center; max-width:94vw; }
  #achpanel { background:rgba(0,0,0,.35); padding:10px 14px; border-radius:14px; }
  #achgrid { display:grid; grid-template-columns:repeat(7, 52px); gap:6px; }
  .ach { display:flex; flex-direction:column; align-items:center; font-size:20px; line-height:1.1; }
  .ach .aname { font-size:8px; font-weight:800; text-align:center; }
  .ach.locked { opacity:.32; filter:grayscale(1); }
  .btitle { font-size:17px; margin-bottom:6px; text-align:center; }
  .brow { display:flex; justify-content:space-between; gap:20px; }
  #nameRow { display:flex; gap:8px; }
  #nameRow input, #adminPass { font-size:18px; font-weight:800; padding:10px 12px; border-radius:10px;
    border:2px solid rgba(255,255,255,.6); background:rgba(0,0,0,.5); color:#fff; text-align:center; width:170px; }
  #saveScore { font-size:18px; font-weight:900; color:#fff; padding:10px 16px; border-radius:10px;
    border:2px solid #fff; background:linear-gradient(180deg,#e9b83a,#b8860b); }
  #adminLock { display:flex; flex-direction:column; gap:8px; }
</style>
</head>
<body>
<div id="hearts" class="hudtext"></div>
<div id="waveLabel" class="hudtext"></div>
<div id="score" class="hudtext">0</div>
<div id="crosshair" class="hidden"></div>
<div id="banner" class="hudtext"></div>
<div id="pauseLabel" class="hudtext hidden">⏸️ PAUSED<span>tap ⚙️ to resume</span></div>
<div id="miniboard" class="hudtext"></div>
<div id="weaponbar"></div>
<div id="stick"><div id="knob"></div></div>
<button id="fireBtn">👊</button>
<button id="jumpBtn">🦘</button>
<div id="lookstick"><div id="lookknob"></div></div>
<button id="adminBtn">⚙️</button>
<div id="adminPanel" class="hidden">
  <div id="adminLock">
    <input id="adminPass" type="password" placeholder="password" autocomplete="off">
    <button class="adbtn" id="adminGo">🔑 Unlock</button>
  </div>
  <div id="adminTools" class="hidden">
    <button class="adbtn" id="adGod">🛡 God Mode</button>
    <button class="adbtn" id="adWeap">🔓 All Weapons</button>
    <button class="adbtn" id="adAmmo">📦 Full Ammo</button>
    <button class="adbtn" id="adHeal">❤️ Full Hearts</button>
    <button class="adbtn" id="adSkip">⏭ Skip Wave</button>
    <button class="adbtn" id="adMaps">🗺 All Maps</button>
  </div>
</div>
<div id="redflash"></div>

<div id="overlay">
  <h1 class="hudtext">🧟 ZOMBIE RAID 3D 🧟</h1>
  <div id="overlaySub" class="sub hudtext"></div>
  <div id="overlayScore" class="big hudtext hidden"></div>
  <div id="nameRow" class="hidden">
    <input id="nameInput" maxlength="10" placeholder="YOUR NAME" autocomplete="off">
    <button id="saveScore">SAVE ⭐</button>
  </div>
  <div id="maprow"></div>
  <button id="playBtn">▶ PLAY</button>
  <div id="metaRow">
    <div id="achpanel" class="hudtext">
      <div class="btitle">🏅 ACHIEVEMENTS <span id="achCount"></span></div>
      <div id="achgrid"></div>
    </div>
    <div id="board" class="hudtext hidden"></div>
  </div>
</div>

<script src="three.min.js"></script>
<script>
'use strict';
// ============================================================ helpers
const rnd = (a=1,b) => b===undefined ? Math.random()*a : a+Math.random()*(b-a);
const clamp = (v,a,b) => v<a?a : v>b?b : v;
const $ = id => document.getElementById(id);
const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints>0 && matchMedia('(pointer:coarse)').matches);
// safe storage (localStorage can throw in sandboxed/private contexts)
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k, v){ try{ localStorage.setItem(k, v); }catch(e){} },
};

// ============================================================ audio (all synthesized, no files)
let AC = null;
function ac(){
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return null;                      // no Web Audio: run the game silently
    if(!AC) AC = new Ctx();
    if(AC.state === 'suspended') AC.resume();
  }catch(e){ /* audio must never block gameplay */ }
  return AC;
}
function tone(f, f2, dur, type='square', vol=0.2, delay=0){
  try{ const a=ac(), t=a.currentTime+delay;
    const o=a.createOscillator(), g=a.createGain();
    o.type=type; o.frequency.setValueAtTime(f,t);
    if(f2) o.frequency.exponentialRampToValueAtTime(Math.max(f2,1), t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o.connect(g).connect(a.destination); o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
function noiseBurst(dur=0.15, vol=0.25, cutoff=1200, delay=0){
  try{ const a=ac(), t=a.currentTime+delay;
    const len = Math.max(1, (dur*a.sampleRate)|0);
    const buf = a.createBuffer(1, len, a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * (1 - i/len);
    const s=a.createBufferSource(); s.buffer=buf;
    const fl=a.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=cutoff;
    const g=a.createGain(); g.gain.value=vol;
    s.connect(fl).connect(g).connect(a.destination); s.start(t);
  }catch(e){}
}
const SFX = {
  punch(){ tone(140, 45, .09, 'square', .3); noiseBurst(.05,.12,700); },
  bat(){ tone(220, 60, .12, 'square', .3); noiseBurst(.08,.2,900); },
  pew(){ tone(880, 180, .12, 'sawtooth', .16); },
  zap(){ tone(1400, 500, .06, 'square', .1); },
  freeze(){ tone(1300, 2200, .18, 'sine', .14); tone(900, 300, .2, 'sine', .1, .05); },
  launch(){ tone(300, 90, .25, 'sawtooth', .2); noiseBurst(.1,.15,500); },
  boom(){ tone(90, 30, .5, 'sine', .5); noiseBurst(.45,.45,400); },
  pop(){ tone(rnd(380,520), 70, .16, 'square', .3); noiseBurst(.1,.2,800); },
  bigpop(){ tone(240, 40, .3, 'square', .4); noiseBurst(.25,.35,600); },
  hurt(){ tone(220, 70, .25, 'sawtooth', .3); },
  groan(){ const f=rnd(70,120); tone(f, f*0.6, rnd(.3,.6), 'sawtooth', .07); },
  shotgun(){ noiseBurst(.12, .3, 900); tone(200, 70, .12, 'square', .25); },
  laser(){ tone(1700, 900, .08, 'sawtooth', .07); },
  meteor(){ tone(1400, 150, .9, 'sine', .12); },
  spit(){ tone(320, 140, .18, 'sawtooth', .18); },
  boing(){ tone(260, 520, .08, 'sine', .1); },
  lob(){ tone(500, 200, .14, 'square', .15); },
  meow(){ tone(680, 950, .12, 'sine', .22); tone(950, 480, .2, 'sine', .18, .12); },
  fart(){ noiseBurst(.4, .45, 260); tone(88, 42, .38, 'sawtooth', .3); },
  click(){ tone(1200, 900, .04, 'square', .07); },
  reload(){ tone(520, 520, .05, 'square', .16); tone(760, 760, .06, 'square', .16, .08); },
  jump(){ tone(280, 560, .14, 'sine', .12); },
  heart(){ tone(660, 990, .12, 'sine', .2); tone(990, 1320, .12, 'sine', .2, .1); },
  unlock(){ [523,659,784,1047].forEach((f,i)=>tone(f,f,.12,'square',.18,i*0.09)); },
  wave(){ tone(392,392,.12,'square',.2); tone(523,523,.18,'square',.2,.13); },
  gameover(){ [392,330,262,196].forEach((f,i)=>tone(f,f,.22,'square',.2,i*0.18)); },
};

// ============================================================ three.js scene
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xff9d5c, 40, 120);
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 300);
camera.rotation.order = 'YXZ';
scene.add(camera); // so view-model children render

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const hemi = new THREE.HemisphereLight(0xffe0c0, 0x3a5a2a, 0.9);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffd0a0, 0.8);
sun.position.set(30, 40, -20);
scene.add(sun);

// shared emoji sprite textures (projectiles, pickups, weapon dressing)
const emojiTexCache = {};
function emojiTexture(emoji){
  if(emojiTexCache[emoji]) return emojiTexCache[emoji];
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const g = c.getContext('2d'); g.font = '52px serif'; g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText(emoji, 32, 36);
  return emojiTexCache[emoji] = new THREE.CanvasTexture(c);
}

// map texture builders
function skyTexture(top, mid, bot){
  const c = document.createElement('canvas'); c.width=16; c.height=256;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0,0,0,256);
  grad.addColorStop(0, top); grad.addColorStop(0.55, mid); grad.addColorStop(1, bot);
  g.fillStyle = grad; g.fillRect(0,0,16,256);
  return new THREE.CanvasTexture(c);
}
function groundTexture(base, s1, s2){
  const c = document.createElement('canvas'); c.width=256; c.height=256;
  const g = c.getContext('2d');
  g.fillStyle = base; g.fillRect(0,0,256,256);
  for(let i=0;i<400;i++){ g.fillStyle = Math.random()<0.5 ? s1 : s2;
    g.fillRect(rnd(256)|0, rnd(256)|0, rnd(3,12)|0, rnd(3,12)|0); }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(12,12);
  return tex;
}

const ARENA = 38;          // player/zombie positions clamp to ±ARENA
const obstacles = [];      // {x,z,r} radial collision
const zones = [];          // {x,z,r,type:'slow'|'ice'} ground effect patches

function addObstacle(x,z,r){ obstacles.push({x,z,r}); }
function addZone(x,z,r,type){ zones.push({x,z,r,type}); }

// ============================================================ map decorations
const woodPost = new THREE.BoxGeometry(0.25, 1.4, 0.25);
function buildFence(g, postColor, railColor){
  const postMat = new THREE.MeshLambertMaterial({ color:postColor });
  const railMat = new THREE.MeshLambertMaterial({ color:railColor });
  const F = 40;
  for(let i=-F; i<=F; i+=5){
    for(const [x,z] of [[i,-F],[i,F],[-F,i],[F,i]]){
      const p = new THREE.Mesh(woodPost, postMat); p.position.set(x, 0.7, z); g.add(p);
    }
  }
  for(const [x,z,w,d] of [[0,-F,2*F,0.15],[0,F,2*F,0.15],[-F,0,0.15,2*F],[F,0,0.15,2*F]]){
    for(const y of [0.5, 1.1]){
      const r = new THREE.Mesh(new THREE.BoxGeometry(w||0.15, 0.12, d||0.15), railMat);
      r.position.set(x, y, z); g.add(r);
    }
  }
}
function decorTree(g, x, z, leaf=0x2e7d32, trunk=0x7a5230, bare=false){
  const t = new THREE.Group();
  const trunkM = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.45, 2.4, 8),
    new THREE.MeshLambertMaterial({ color:trunk }));
  trunkM.position.y = 1.2; t.add(trunkM);
  if(bare){
    for(let i=0;i<3;i++){
      const b = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.14, 1.7, 5), trunkM.material);
      b.position.set(rnd(-0.5,0.5), rnd(2.2,3), rnd(-0.5,0.5));
      b.rotation.set(rnd(-0.9,0.9), 0, rnd(-0.9,0.9));
      t.add(b);
    }
  } else {
    const leafMat = new THREE.MeshLambertMaterial({ color:leaf });
    for(let i=0;i<3;i++){
      const s = new THREE.Mesh(new THREE.SphereGeometry(rnd(1.1,1.7), 8, 6), leafMat);
      s.position.set(rnd(-0.7,0.7), rnd(2.4,3.6), rnd(-0.7,0.7)); t.add(s);
    }
  }
  t.position.set(x, 0, z); g.add(t);
  addObstacle(x, z, 0.8);
}
function decorPine(g, x, z, snowy){
  const t = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1.2, 7),
    new THREE.MeshLambertMaterial({ color:0x6a4a2a }));
  trunk.position.y = 0.6; t.add(trunk);
  const green = new THREE.MeshLambertMaterial({ color:0x1f6032 });
  const white = new THREE.MeshLambertMaterial({ color:0xf2f7fb });
  for(let i=0;i<3;i++){
    const cone = new THREE.Mesh(new THREE.ConeGeometry(1.7 - i*0.45, 1.5, 8), (snowy && i===2) ? white : green);
    cone.position.y = 1 + i*0.95; t.add(cone);
  }
  t.position.set(x, 0, z); g.add(t);
  addObstacle(x, z, 0.8);
}
function decorPalm(g, x, z){
  const t = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.3, 3.6, 7),
    new THREE.MeshLambertMaterial({ color:0xa07444 }));
  trunk.position.y = 1.8; trunk.rotation.z = rnd(-0.15, 0.15); t.add(trunk);
  const leafMat = new THREE.MeshLambertMaterial({ color:0x3da03d, side:THREE.DoubleSide });
  for(let i=0;i<6;i++){
    const leaf = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 0.5), leafMat);
    const a = i/6*Math.PI*2;
    leaf.position.set(Math.cos(a)*0.9, 3.7, Math.sin(a)*0.9);
    leaf.rotation.y = -a; leaf.rotation.z = -0.5;
    t.add(leaf);
  }
  t.position.set(x, 0, z); g.add(t);
  addObstacle(x, z, 0.6);
}
const graveMat = new THREE.MeshLambertMaterial({ color:0x9a9aa5 });

let envGroup = null;
const clouds = [];
function buildMap(mi){
  currentMap = mi;
  const M = MAPS[mi];
  if(envGroup){
    scene.remove(envGroup);
    envGroup.traverse(o => { if(o.geometry && o.geometry !== woodPost) o.geometry.dispose(); });
  }
  envGroup = new THREE.Group();
  clouds.length = 0;
  obstacles.length = 0;
  zones.length = 0;
  scene.fog.color.setHex(M.fog);
  scene.fog.near = M.fogNear || 40;
  scene.fog.far = M.fogFar || 120;
  hemi.color.setHex(M.hemi[0]); hemi.groundColor.setHex(M.hemi[1]); hemi.intensity = M.hemi[2];
  sun.color.setHex(M.sun); sun.intensity = M.sunI;
  const sky = new THREE.Mesh(new THREE.SphereGeometry(150, 16, 12),
    new THREE.MeshBasicMaterial({ map: skyTexture(...M.sky), side:THREE.BackSide, fog:false }));
  envGroup.add(sky);
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300),
    new THREE.MeshLambertMaterial({ map: groundTexture(...M.ground) }));
  ground.rotation.x = -Math.PI/2;
  envGroup.add(ground);
  buildFence(envGroup, M.fence[0], M.fence[1]);
  const cloudMat = new THREE.MeshLambertMaterial({ color:M.cloud, fog:false });
  for(let i=0;i<7;i++){
    const cg = new THREE.Group();
    for(let j=0;j<3;j++){
      const s = new THREE.Mesh(new THREE.SphereGeometry(rnd(2,4), 8, 6), cloudMat);
      s.position.set(rnd(-4,4), rnd(-0.5,0.5), rnd(-2,2)); s.scale.y = 0.55; cg.add(s);
    }
    cg.position.set(rnd(-90,90), rnd(26,40), rnd(-90,90));
    envGroup.add(cg); clouds.push(cg);
  }
  M.build(envGroup);
  scene.add(envGroup);
}

  if(type === 'spitter') mouth.scale.set(1.3, 2.4, 1); // big goo-spitting mouth

  // arms pivot at shoulders, pointing forward (rotation.x = -PI/2)
  const armGeo = new THREE.BoxGeometry(0.16, 0.7, 0.16); armGeo.translate(0, -0.35, 0);
  const armL = new THREE.Mesh(armGeo, skin); armL.position.set(-0.46, 1.5, 0); armL.rotation.x = -Math.PI/2;
  const armR = new THREE.Mesh(armGeo, skin); armR.position.set(0.46, 1.5, 0); armR.rotation.x = -Math.PI/2;
  g.add(armL, armR);

  const legGeo = new THREE.BoxGeometry(0.2, 0.75, 0.2); legGeo.translate(0, -0.375, 0);
  const legL = new THREE.Mesh(legGeo, pants); legL.position.set(-0.18, 0.75, 0);
  const legR = new THREE.Mesh(legGeo, pants); legR.position.set(0.18, 0.75, 0);
  g.add(legL, legR);

  const blob = new THREE.Mesh(blobGeo, blobMat);
  blob.rotation.x = -Math.PI/2; blob.position.y = 0.02; blob.scale.setScalar(1.2);
  g.add(blob);

  g.scale.setScalar(s);
  const a = rnd(Math.PI*2), r = rnd(28, 36);
  g.position.set(Math.cos(a)*r, 0, Math.sin(a)*r);
  scene.add(g);

  let hp, speed;
  if(type==='normal'){ hp = wave<3?1 : wave<6?2 : wave<10?3 : 4; speed = rnd(1.4,1.9) + Math.min(wave*0.08, 1.6); }
  else if(type==='runner'){ hp = wave<8?1:2; speed = rnd(3.0,3.7) + Math.min(wave*0.05, 1); }
  else if(type==='spitter'){ hp = 2 + (wave/4|0); speed = rnd(1.5,1.9); }
  else if(type==='brute'){ hp = 6 + Math.round(wave*0.7); speed = rnd(0.9,1.2); }
  else { hp = 25 + wave*6; speed = 1.15 + Math.min(wave*0.02, 0.5); }
  // harder maps: tougher, faster, worth more
  const D = MAPS[currentMap].diff;
  hp = Math.max(1, Math.round(hp * D[0]));
  speed *= D[1];

  zombies.push({ g, mats, armL, armR, legL, legR, type, s, hp, speed,
    score:Math.round(T.score * D[3]), drop:T.drop, phase:rnd(Math.PI*2),
    frozen:0, flash:0, atkT:rnd(0.4,1), kbx:0, kbz:0,
    wanderT:0, wx:0, wz:0 });
}

const gibGeo = new THREE.BoxGeometry(0.14, 0.14, 0.14);
const matCache = {};
function cachedMat(color){ return matCache[color] || (matCache[color] = new THREE.MeshLambertMaterial({ color })); }
const particles = [];
function burst(x, y, z, color, n=14, spd=5){
  for(let i=0;i<n;i++){
    const m = new THREE.Mesh(gibGeo, cachedMat(color));
    m.position.set(x + rnd(-0.3,0.3), y + rnd(-0.3,0.3), z + rnd(-0.3,0.3));
    m.scale.setScalar(rnd(0.6,1.6));
    scene.add(m);
    particles.push({ m, vx:rnd(-spd,spd), vy:rnd(spd*0.5,spd*1.4), vz:rnd(-spd,spd),
      rx:rnd(-8,8), rz:rnd(-8,8), life:rnd(0.5,0.9), max:0.9 });
  }
}

const projGeo = new THREE.SphereGeometry(1, 8, 6);
const projectiles = [];
function shootProjectile(w, spread=0){
  const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
  if(spread){
    dir.x += rnd(-spread, spread); dir.y += rnd(-spread, spread)*0.6; dir.z += rnd(-spread, spread);
    dir.normalize();
  }
  let m;
  if(w.sprite){
    m = new THREE.Sprite(new THREE.SpriteMaterial({ map: emojiTexture(w.sprite) }));
    m.scale.setScalar(w.size*2.2);
  } else {
    m = new THREE.Mesh(projGeo, new THREE.MeshBasicMaterial({ color:w.color }));
    m.scale.setScalar(w.size);
  }
  m.position.copy(camera.position).addScaledVector(dir, 0.6); m.position.y -= 0.12;
  scene.add(m);
  projectiles.push({ m, vx:dir.x*w.speed, vy:dir.y*w.speed + (w.gravity?2:0), vz:dir.z*w.speed,
    w, life:2.5, bounces:w.bounce||0, hitT:0 });
}

// fart cannon: cone of stinky knockback
function coneBlast(w){
  const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
  for(const z of [...zombies]){
    const dx = z.g.position.x - player.x, dz = z.g.position.z - player.z;
    const d = Math.hypot(dx, dz);
    if(d > w.range + z.s*0.5 || d < 0.001) continue;
    if((dx/d)*dir.x + (dz/d)*dir.z < 0.25) continue;
    damageZombie(z, w.dmg, w.knock, dx/d, dz/d);
  }
  burst(player.x + dir.x*2.5, 1.1, player.z + dir.z*2.5, 0x9fce4a, 14, 4);
  burst(player.x + dir.x*4.5, 1.2, player.z + dir.z*4.5, 0x7fae3a, 10, 3);
  SFX.fart();
  shake = Math.min(shake + 0.25, 0.6);
  unlockAch('fart');
}

// star storm: meteors rain down where you're aiming
function spawnMeteors(w){
  const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
  let t = dir.y < -0.05 ? camera.position.y / -dir.y : 14;
  t = clamp(t, 5, 30);
  const tx = clamp(camera.position.x + dir.x*t, -ARENA, ARENA);
  const tz = clamp(camera.position.z + dir.z*t, -ARENA, ARENA);
  for(let i=0;i<3;i++){
    const m = new THREE.Mesh(projGeo, new THREE.MeshBasicMaterial({ color:w.color }));
    m.scale.setScalar(w.size);
    m.position.set(tx + rnd(-4,4), rnd(16,22), tz + rnd(-4,4));
    scene.add(m);
    projectiles.push({ m, vx:rnd(-1,1), vy:-19, vz:rnd(-1,1), w, life:3, bounces:0, hitT:0 });
  }
}

let beamUntil = 0;
const beamUp = new THREE.Vector3(0, 1, 0);
const beamGeo = new THREE.CylinderGeometry(0.06, 0.06, 1, 6, 1, true);

function beamAttack(w){
  const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
  for(const z of [...zombies]){
    const vx = z.g.position.x - camera.position.x;
    const vy = z.g.position.y + 1.1*z.s - camera.position.y;
    const vz = z.g.position.z - camera.position.z;
    const t = vx*dir.x + vy*dir.y + vz*dir.z;
    if(t < 0 || t > w.range) continue;
    const px = vx - dir.x*t, py = vy - dir.y*t, pz = vz - dir.z*t;
    if(Math.hypot(px, py, pz) < w.radius + 0.45*z.s){
      damageZombie(z, w.dmg);
      burst(z.g.position.x, 1.1*z.s, z.g.position.z, w.color, 3, 2.5);
    }

    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.032, 6, 6), eyeMat); eye.position.set(ex*0.6, 0.65, 0.56); g.add(eye);

  const legGeo = new THREE.BoxGeometry(0.08, 0.32, 0.08); legGeo.translate(0, -0.16, 0);
  const legs = [];
  for(const [lx, lz] of [[-0.12, 0.24], [0.12, 0.24], [-0.12, -0.24], [0.12, -0.24]]){

  blob.rotation.x = -Math.PI/2; blob.position.y = 0.02; blob.scale.setScalar(0.6); g.add(blob);

function launchCat(){

  cats.push({ g:c.g, legs:c.legs, tail:c.tail, life:10, atkT:0.3, meowT:rnd(1.5,3), phase:0 });

// ============================================================ combat
function damageZombie(z, dmg, knock=0, kdx=0, kdz=0){
  z.hp -= dmg;
  z.flash = 0.09;
  if(knock > 0){ z.kbx += kdx*knock; z.kbz += kdz*knock; }
  if(z.hp <= 0) killZombie(z);
}
function killZombie(z, giveScore=true){
  const i = zombies.indexOf(z);
  if(i < 0) return;
  zombies.splice(i, 1);
  scene.remove(z.g);
  const p = z.g.position;
  burst(p.x, 1*z.s, p.z, 0x6fbf4a, 10 + z.s*8 | 0, 4 + z.s*2);
  burst(p.x, 1*z.s, p.z, 0x3f7f2f, 6, 4);
  (z.type==='boss' || z.type==='brute') ? SFX.bigpop() : SFX.pop();
  if(giveScore){
    addScore(z.score);
    stats.kills++; saveStats();
    unlockAch('pop1');
    if(stats.kills >= 100) unlockAch('pop100');
    if(stats.kills >= 500) unlockAch('pop500');
    if(z.type === 'boss') unlockAch('boss');
  }
  if(Math.random() < z.drop) dropPickup(p.x, p.z, 'heart');
  else if(Math.random() < 0.09) dropPickup(p.x, p.z, 'ammo');
  if(z.type === 'boss') dropPickup(p.x + 1.2, p.z, 'ammo');
}
function meleeAttack(w){
  const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
  let hitAny = false;
  // bat hits everything in the arc; fists hit the nearest
  let nearest = null, nearestD = 1e9;
  for(const z of zombies){
    const dx = z.g.position.x - player.x, dz = z.g.position.z - player.z;
    const d = Math.hypot(dx, dz);
    const reach = w.range + z.s*0.5;
    if(d > reach || d < 0.001) continue;
    const dot = (dx/d)*dir.x + (dz/d)*dir.z;
    if(dot < 0.5) continue;
    if(w.name === 'Fists'){
      if(d < nearestD){ nearestD = d; nearest = z; }
    } else {
      damageZombie(z, w.dmg, w.knock, dx/d, dz/d);
      hitAny = true;
    }
  }
  if(nearest){
    const dx = nearest.g.position.x - player.x, dz = nearest.g.position.z - player.z;
    const d = Math.hypot(dx, dz);
    damageZombie(nearest, w.dmg, w.knock, dx/d, dz/d);
    hitAny = true;
  }
  w.name === 'Fists' ? SFX.punch() : SFX.bat();
  if(hitAny) shake = Math.min(shake + 0.12, 0.5);
}
function tryAttack(now){
  const w = WEAPONS[curWeapon];
  if(now - lastShot < w.rate) return;
  lastShot = now;
  if(w.type !== 'melee' && ammo[curWeapon] <= 0){ SFX.click(); return; }
  attackAnim = 1;
  if(w.type === 'melee'){
    punchHand = 1 - punchHand;
    meleeAttack(w);
  } else if(w.type === 'beam'){
    beamAttack(w);
    beamUntil = now + 140;
    SFX.laser();
  } else if(w.type === 'cone'){
    coneBlast(w);
  } else {
    if(w.meteor){ spawnMeteors(w); SFX.meteor(); }
    else if(w.cat){ launchCat(); SFX.meow(); }
    else if(w.pellets){
      for(let i=0;i<w.pellets;i++) shootProjectile(w, w.spread);
      SFX.shotgun();
    } else {
      shootProjectile(w);
      if(w.meow) SFX.meow();
      else if(w.sprite) SFX.lob();
      else if(w.blast) SFX.launch();
      else if(w.freeze) SFX.freeze();
      else if(w.rate < 200) SFX.zap();
      else SFX.pew();
    }
    const vm = viewModels[curWeapon];
    if(vm.userData.flash){ vm.userData.flash.visible = true; setTimeout(() => vm.userData.flash.visible = false, 50); }
  }
  if(w.type !== 'melee'){ ammo[curWeapon]--; refreshWeaponBar(); }
}
function hurtPlayer(){
  if(player.invuln > 0 || state !== 'playing' || admin.god || shieldT > 0) return;
  waveHurt = true;
  player.hearts--;
  player.invuln = 1.0;
  shake = Math.min(shake + 0.4, 0.8);
  SFX.hurt();
  redflash.style.opacity = 1;
  setTimeout(() => redflash.style.opacity = 0, 200);
  updateHUD();
  if(player.hearts <= 0) gameOver();
}

// ============================================================ waves
function startWave(w){
  wave = w;
  spawnQueue = [];
  skippedWave = false;
  waveHurt = false;
  if(w >= 5) unlockAch('wave5');
  if(w >= 10) unlockAch('wave10');
  // beat the boss wave, travel to the next map (cycles after the last one)
  const mi = (runStartMap + ((w - 1) / 5 | 0)) % MAPS.length;
  let traveled = false;
  if(mi !== currentMap){
    buildMap(mi);
    traveled = true;
    for(const pk of pickups) scene.remove(pk.sp); // old map's treats don't travel
    pickups.length = 0;
    if(mi + 1 > unlockedMaps){
      unlockedMaps = mi + 1;
      store.set('zr3d_maps', unlockedMaps);
      refreshMapBtns();
    }
    runVisited.add(mi);
    if(runVisited.size >= MAPS.length) unlockAch('travel');
  }
  // map-specific easter egg sometimes appears
  if(Math.random() < 0.45) dropPickup(rnd(-20, 20), rnd(-20, 20), 'egg');
  const n = Math.round((5 + w*2) * MAPS[currentMap].diff[2]);
  const runnerChance = w >= 3 ? Math.min(0.12 + w*0.03, 0.45) : 0;
  for(let i=0;i<n;i++) spawnQueue.push(Math.random() < runnerChance ? 'runner' : 'normal');
  if(w >= 4) for(let i=0;i<(w/3|0);i++) spawnQueue.splice((rnd(spawnQueue.length)|0), 0, 'brute');
  if(w >= 5) for(let i=0;i<(w/3|0);i++) spawnQueue.splice((rnd(spawnQueue.length)|0), 0, 'spitter');
  if(w % 5 === 0) for(let i=0;i<1+(w/10|0);i++) spawnQueue.push('boss');
  spawnT = 0.5;
  const M = MAPS[currentMap];
  showBanner(traveled ? '🚌 ' + M.emoji + ' ' + M.name.toUpperCase() + '! WAVE ' + w
    : w % 5 === 0 ? '💀 BOSS WAVE ' + w + '! 💀' : 'WAVE ' + w);
  if(traveled) SFX.unlock(); else SFX.wave();
  updateHUD();
}

function clearEntities(){
  for(const z of zombies) scene.remove(z.g);

  for(const p of projectiles) scene.remove(p.m);

  for(const p of pickups) scene.remove(p.sp);
  pickups.length = 0;
  for(const f of flashes) scene.remove(f.m);
  flashes.length = 0;
  for(const s of enemyShots) scene.remove(s.m);
  enemyShots.length = 0;
  for(const c of cats) scene.remove(c.g);
  cats.length = 0;
  beamUntil = 0;
  beamMesh.visible = false;
}

// ---- leaderboard: global via Firebase Realtime Database, with the local copy
// as cache/fallback when offline. Each device appends its own entry (atomic
// POST, no read-merge-write race). Admin tools can't add score, so all runs count.
const FIREBASE_DB = 'https://zombie-raid-3d-default-rtdb.firebaseio.com';
const boardOn = () => !!FIREBASE_DB;
async function boardRead(){
  const r = await fetch(FIREBASE_DB + '/scores.json');
  if(!r.ok) throw new Error(r.status);
  const data = await r.json();
  if(!data) return [];
  return Object.values(data).filter(e => e && typeof e.s === 'number' && e.n);
}
async function boardAppend(entry){
  const r = await fetch(FIREBASE_DB + '/scores.json',
    { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(entry) });
  if(!r.ok) throw new Error(r.status);
}
function esc(s){ return String(s).replace(/[<>&]/g, ''); }
function readCachedBoard(){
  try{ const b = JSON.parse(store.get('zr3d_board') || '[]'); return Array.isArray(b) ? b : []; }
  catch(e){ return []; }
}
let board = readCachedBoard();
let boardGlobal = false;
function mergeBoard(list){
  const seen = new Set();
  return list
    .filter(e => e && typeof e.s === 'number' && e.n)
    .filter(e => { const k = e.n + '|' + e.s + '|' + e.w; if(seen.has(k)) return false; seen.add(k); return true; })
    .sort((a, b2) => b2.s - a.s)
    .slice(0, 10);
}
function cacheBoard(){ store.set('zr3d_board', JSON.stringify(board)); }
async function fetchBoard(){
  if(!boardOn()) return;
  try{
    const remote = await boardRead();
    board = mergeBoard(remote.concat(board));
    boardGlobal = true;
    cacheBoard();
    renderBoard();
  }catch(e){ boardGlobal = false; }
}
async function submitScore(entry){
  board = mergeBoard(board.concat([entry]));
  cacheBoard();
  renderBoard();
  if(!boardOn()) return;
  try{
    await boardAppend(entry);            // atomic append — never clobbers others
    const remote = await boardRead();     // re-read the merged global board
    board = mergeBoard(remote.concat(board));
    boardGlobal = true;
    cacheBoard();
    renderBoard();
  }catch(e){}
}
function qualifiesForBoard(s){
  return board.length < 10 || s > board[board.length - 1].s;
}
function renderBoard(){
  const b = board.slice(0, 5);
  const boardEl = $('board');
  if(!b.length) boardEl.classList.add('hidden');
  else {
    boardEl.classList.remove('hidden');
    boardEl.innerHTML = '<div class="btitle">🏆 TOP SCORES ' +
      (boardGlobal ? '🌍' : '<span style="font-size:11px">(this device)</span>') + '</div>' +
      b.map((e, i) => `<div class="brow"><span>${i+1}. ${esc(e.n)}</span><span>${e.m || ''} wave ${e.w} · ${e.s}</span></div>`).join('');
  }
  $('miniboard').innerHTML = board.slice(0, 3).map((e, i) =>
    `<div>${['🥇','🥈','🥉'][i]} ${esc(e.n)} ${e.s}</div>`).join('');
}

// touch: left zone = move joystick, right zone = look
let joyId = null, lookId = null;
let joyBase = {x:0, y:0}, joyVec = {x:0, y:0};
let lookLast = {x:0, y:0};

function touchStart(e){
  e.preventDefault();
  ac(); // unlock audio
  for(const t of e.changedTouches){
    if(t.clientX < innerWidth*0.42 && joyId === null){
      joyId = t.identifier;
      joyBase = { x:t.clientX, y:t.clientY };
      joyVec = { x:0, y:0 };
      stickEl.style.display = 'block';
      stickEl.style.left = (t.clientX - 65) + 'px';
      stickEl.style.top = (t.clientY - 65) + 'px';
      knobEl.style.left = '37px'; knobEl.style.top = '37px';
    } else if(lookId === null){
      lookId = t.identifier;
      lookLast = { x:t.clientX, y:t.clientY };
    }
  }
}
function touchMove(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier === joyId){
      let dx = t.clientX - joyBase.x, dy = t.clientY - joyBase.y;
      const d = Math.hypot(dx, dy);
      if(d > 52){ dx = dx/d*52; dy = dy/d*52; }
      joyVec = { x:dx/52, y:dy/52 };
      knobEl.style.left = (37 + dx) + 'px';
      knobEl.style.top = (37 + dy) + 'px';
    } else if(t.identifier === lookId){
      yaw -= (t.clientX - lookLast.x) * 0.006;
      pitch = clamp(pitch - (t.clientY - lookLast.y) * 0.006, -1.25, 1.25);
      lookLast = { x:t.clientX, y:t.clientY };
    }
  }
}
function touchEnd(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier === joyId){ joyId = null; joyVec = {x:0,y:0}; stickEl.style.display = 'none'; }
    else if(t.identifier === lookId){ lookId = null; }
  }
}
renderer.domElement.addEventListener('touchstart', touchStart, { passive:false });
renderer.domElement.addEventListener('touchmove', touchMove, { passive:false });
renderer.domElement.addEventListener('touchend', touchEnd, { passive:false });

function loop(now){

  lastT = now;
  if(paused) dt = 0; // settings open: freeze all motion, keep rendering

}

// ---- simulation: advances all game state (positions, AI, spawns, timers) —
// the part an authoritative server would own for multiplayer. View-only work
// (camera, weapon pose, beam) lives in renderFrame() so the two can diverge:
// a networked client will replace simulate() with "apply state from server".
function simulate(dt, now){
  const playing = state === 'playing';

  // ---- player movement
  if(playing){
    let mf = (keys.KeyW||keys.ArrowUp?1:0) - (keys.KeyS||keys.ArrowDown?1:0) - joyVec.y;
    let mr = (keys.KeyD||keys.ArrowRight?1:0) - (keys.KeyA||keys.ArrowLeft?1:0) + joyVec.x;
    const mag = Math.hypot(mf, mr);
    if(mag > 1){ mf /= mag; mr /= mag; }
    const sy = Math.sin(yaw), cy = Math.cos(yaw);
    // ground effects: mud/water slows you, ice is slippery (jumping clears both)
    let speed = 5.4 * (speedT > 0 ? 1.5 : 1);
    let onIce = false;
    if(py < 0.3) for(const zn of zones){
      if(Math.hypot(player.x - zn.x, player.z - zn.z) < zn.r){
        if(zn.type === 'slow') speed *= 0.55;
        else onIce = true;
      }
    }
    const accel = onIce ? 3 : 40;
    pvx += ((-sy*mf + cy*mr)*speed - pvx) * Math.min(1, accel*dt);
    pvz += ((-cy*mf - sy*mr)*speed - pvz) * Math.min(1, accel*dt);
    player.x += pvx * dt;
    player.z += pvz * dt;
    player.x = clamp(player.x, -ARENA, ARENA);
    player.z = clamp(player.z, -ARENA, ARENA);
    for(const o of obstacles){
      const dx = player.x - o.x, dz = player.z - o.z;
      const d = Math.hypot(dx, dz), min = o.r + 0.4;
      if(d < min && d > 0.001){ player.x = o.x + dx/d*min; player.z = o.z + dz/d*min; }
    }
    // jump physics
    if(py > 0 || jvy > 0){
      py += jvy * dt;
      jvy -= 22 * dt;
      if(py <= 0){ py = 0; jvy = 0; }
    }
    if(mag > 0.1 && py === 0) bobT += dt*9;
    if(player.invuln > 0) player.invuln -= dt;
    if(speedT > 0) speedT -= dt;
    if(shieldT > 0){ shieldT -= dt; if(shieldT <= 0) updateHUD(); }
    if(firing && !paused) tryAttack(now);
    // look joystick (rate-based)
    if(lookVec.x || lookVec.y){
      yaw -= lookVec.x * 2.8 * dt;
      pitch = clamp(pitch - lookVec.y * 1.9 * dt, -1.25, 1.25);
    }
  }

  // ---- spawning
  if(playing){
    if(spawnQueue.length && zombies.length < Math.min(14 + wave, 26)){
      spawnT -= dt;
      if(spawnT <= 0){
        makeZombie(spawnQueue.shift(), wave);
        spawnT = Math.max(0.2, 0.8 - wave*0.05);
      }
    }
    if(!spawnQueue.length && !zombies.length){
      if(waveBreakT <= 0){
        const bonus = 20 + wave*10;
        if(!skippedWave) addScore(bonus);
        if(!skippedWave && !waveHurt) unlockAch('perfect');
        for(let j=0;j<WEAPONS.length;j++) if(unlocked[j] && WEAPONS[j].maxAmmo && !WEAPONS[j].cat)
          ammo[j] = Math.min(WEAPONS[j].maxAmmo, ammo[j] + Math.ceil(WEAPONS[j].maxAmmo*0.15));
        refreshWeaponBar();
        showBanner(skippedWave ? 'WAVE SKIPPED!' : 'WAVE CLEARED! +' + bonus);
        waveBreakT = 2.4;
      } else {
        waveBreakT -= dt;
        if(waveBreakT <= 0) startWave(wave + 1);
      }
    }
    groanT -= dt;
    if(groanT <= 0 && zombies.length){ SFX.groan(); groanT = rnd(1.5, 4); }
  }

  // ---- zombies
  for(let i = zombies.length-1; i >= 0; i--){
    const z = zombies[i];
    const p = z.g.position;
    let dirx = 0, dirz = 0;

    if(playing){
      const dx = player.x - p.x, dz = player.z - p.z;
      const d = Math.hypot(dx, dz);
      const stop = 1.0 + z.s*0.45;
      if(z.frozen <= 0){
        if(z.type === 'spitter'){
          // keeps its distance and lobs goo
          if(d > 13){ dirx = dx/d; dirz = dz/d; }
          else if(d < 7){ dirx = -dx/d; dirz = -dz/d; }
        } else if(d > stop){ dirx = dx/d; dirz = dz/d; }
      }
      // attack (a mid-jump player is out of swiping reach)
      z.atkT -= dt;
      if(z.frozen <= 0 && z.atkT <= 0){
        if(z.type === 'spitter'){
          if(d < 18){ z.atkT = 2.4; spit(z); }
        } else if(d < stop + 0.45 && py < 0.9){
          z.atkT = 1.1;
          hurtPlayer();
        }
      }
    } else {
      // wander aimlessly (menu / game-over)
      z.wanderT -= dt;
      if(z.wanderT <= 0){
        z.wanderT = rnd(2, 5);
        const a = rnd(Math.PI*2);
        z.wx = Math.cos(a); z.wz = Math.sin(a);
      }
      dirx = z.wx*0.5; dirz = z.wz*0.5;
    }

    if(z.frozen > 0){ z.frozen -= dt; dirx = 0; dirz = 0; }
    let zspeed = z.speed;
    for(const zn of zones) if(zn.type === 'slow' && Math.hypot(p.x - zn.x, p.z - zn.z) < zn.r){ zspeed *= 0.55; break; }
    p.x += dirx * zspeed * dt + z.kbx * dt;
    p.z += dirz * zspeed * dt + z.kbz * dt;
    z.kbx *= Math.pow(0.02, dt); z.kbz *= Math.pow(0.02, dt);
    p.x = clamp(p.x, -ARENA, ARENA); p.z = clamp(p.z, -ARENA, ARENA);

    // face movement direction (or the player; spitters always face the player)
    if(playing && z.type === 'spitter') z.g.rotation.y = Math.atan2(player.x - p.x, player.z - p.z);
    else if(Math.abs(dirx) + Math.abs(dirz) > 0.01) z.g.rotation.y = Math.atan2(dirx, dirz);
    else if(playing) z.g.rotation.y = Math.atan2(player.x - p.x, player.z - p.z);

    // shamble animation
    z.phase += dt * z.speed * 3;
    const moving = Math.abs(dirx) + Math.abs(dirz) > 0.01;
    z.g.rotation.z = Math.sin(z.phase) * 0.06;
    z.legL.rotation.x = moving ? Math.sin(z.phase*2) * 0.55 : 0;
    z.legR.rotation.x = moving ? -Math.sin(z.phase*2) * 0.55 : 0;
    z.armL.rotation.x = -Math.PI/2 + Math.sin(z.phase*2) * 0.12;
    z.armR.rotation.x = -Math.PI/2 - Math.sin(z.phase*2) * 0.12;
    p.y = Math.abs(Math.sin(z.phase*2)) * 0.05 * z.s;

    // hit flash / freeze tint
    if(z.flash > 0) z.flash -= dt;
    const f = z.flash > 0 ? 0.85 : 0;
    const frozenF = z.frozen > 0 ? 0.65 : 0;
    for(const {m, base} of z.mats){
      m.emissive.setRGB(f, f, f);
      if(frozenF > 0 || m.color.getHex() !== base.getHex()){
        m.color.copy(base).lerp(new THREE.Color(0x77bbff), frozenF);
      }
    }
  }
  // cheap separation so zombies don't stack
  for(let i=0;i<zombies.length;i++) for(let j=i+1;j<zombies.length;j++){
    const a = zombies[i].g.position, b = zombies[j].g.position;
    const dx = b.x-a.x, dz = b.z-a.z;
    const d = Math.hypot(dx, dz), min = (zombies[i].s + zombies[j].s)*0.42;
    if(d < min && d > 0.001){
      const push = (min-d)*0.5;
      a.x -= dx/d*push; a.z -= dz/d*push;
      b.x += dx/d*push; b.z += dz/d*push;
    }
  }

  // ---- projectiles
  for(let i = projectiles.length-1; i >= 0; i--){
    const pr = projectiles[i];
    if(pr.w.gravity) pr.vy -= 9 * dt;
    pr.m.position.x += pr.vx*dt; pr.m.position.y += pr.vy*dt; pr.m.position.z += pr.vz*dt;
    pr.life -= dt;
    pr.hitT -= dt;
    let dead = pr.life <= 0;
    const floor = Math.max(0.05, pr.w.size*0.8);
    if(pr.m.position.y <= floor){
      if(pr.w.bounce && pr.bounces > 0 && pr.vy < 0){
        pr.vy = -pr.vy*0.7; pr.bounces--; pr.m.position.y = floor;
        SFX.boing();
      } else {
        if(pr.w.blast) explosion(pr.m.position.x, 0.3, pr.m.position.z, pr.w.blast, pr.w.dmg);
        dead = true;
      }
    }
    if(!dead && pr.hitT <= 0) for(const z of zombies){
      const zp = z.g.position;
      const dx = pr.m.position.x - zp.x, dz = pr.m.position.z - zp.z;
      const dd = Math.hypot(dx, dz);
      if(dd < 0.55*z.s + pr.w.size && pr.m.position.y < 2.4*z.s){
        if(pr.w.blast){
          explosion(pr.m.position.x, pr.m.position.y, pr.m.position.z, pr.w.blast, pr.w.dmg);
          dead = true;
        } else {
          damageZombie(z, pr.w.dmg, pr.w.knock || 2, dd>0.001?-dx/dd:0, dd>0.001?-dz/dd:0);
          if(pr.w.freeze) z.frozen = pr.w.freeze;
          burst(pr.m.position.x, pr.m.position.y, pr.m.position.z, pr.w.color, 5, 3);
          if(pr.w.pierce) pr.hitT = 0.25;
          else dead = true;
        }
        break;
      }
    }
    if(dead){ scene.remove(pr.m); pr.m.material.dispose(); projectiles.splice(i, 1); }
  }

  // ---- pet cat
  for(let i = cats.length-1; i >= 0; i--){
    const c = cats[i];
    c.life -= dt;
    if(c.life <= 0){
      burst(c.g.position.x, 0.5, c.g.position.z, 0xf59c42, 8, 3);
      scene.remove(c.g);
      cats.splice(i, 1);
      catNapT = 12; // the cat needs a nap before the cannon reloads
      continue;
    }
    // chase the nearest zombie; otherwise orbit the player
    let target = null, bd = 1e9;
    for(const z of zombies){
      const d = Math.hypot(z.g.position.x - c.g.position.x, z.g.position.z - c.g.position.z);
      if(d < bd){ bd = d; target = z; }
    }
    let tx, tz;
    if(target){ tx = target.g.position.x; tz = target.g.position.z; }
    else { tx = player.x + Math.cos(now*0.001)*3; tz = player.z + Math.sin(now*0.001)*3; }
    const dx = tx - c.g.position.x, dz = tz - c.g.position.z;
    const d = Math.hypot(dx, dz) || 1;
    const stopAt = target ? 0.6 + target.s*0.4 : 0.5;
    if(d > stopAt){
      c.g.position.x = clamp(c.g.position.x + dx/d * 6.5 * dt, -ARENA, ARENA);
      c.g.position.z = clamp(c.g.position.z + dz/d * 6.5 * dt, -ARENA, ARENA);
    }
    c.g.rotation.y = Math.atan2(dx, dz);
    c.phase += dt * 14;
    for(let l=0;l<c.legs.length;l++) c.legs[l].rotation.x = Math.sin(c.phase + (l%2)*Math.PI) * 0.7;
    c.tail.rotation.z = Math.sin(c.phase*0.4) * 0.25;
    c.g.position.y = Math.abs(Math.sin(c.phase*0.5)) * 0.06;
    // pounce!
    c.atkT -= dt;
    if(target && bd < stopAt + 0.5 && c.atkT <= 0){
      c.atkT = 0.7;
      const w = WEAPONS[WEAPONS.findIndex(w2 => w2.cat)];
      damageZombie(target, w.dmg, 2.5, dx/d, dz/d);
      burst(c.g.position.x + dx/d*0.4, 0.8, c.g.position.z + dz/d*0.4, 0xffcc88, 4, 2.5);
    }
    c.meowT -= dt;
    if(c.meowT <= 0){ c.meowT = rnd(2.5, 5); SFX.meow(); }
  }
  if(catNapT > 0){
    catNapT -= dt;
    if(catNapT <= 0){
      const wi = WEAPONS.findIndex(w => w.cat);
      if(unlocked[wi] && ammo[wi] < WEAPONS[wi].maxAmmo){
        ammo[wi] = WEAPONS[wi].maxAmmo;
        refreshWeaponBar();
        if(state === 'playing') SFX.meow();
      }
    }
  }

  // ---- enemy goo shots
  for(let i = enemyShots.length-1; i >= 0; i--){
    const s = enemyShots[i];
    s.m.position.x += s.vx*dt; s.m.position.y += s.vy*dt; s.m.position.z += s.vz*dt;
    s.life -= dt;
    let dead = s.life <= 0 || s.m.position.y <= 0.05;
    if(playing && Math.hypot(s.m.position.x - player.x, s.m.position.z - player.z) < 0.7
       && Math.abs(s.m.position.y - (1.3 + py)) < 1.3){
      hurtPlayer();
      dead = true;
    }
    if(dead){
      burst(s.m.position.x, Math.max(s.m.position.y, 0.2), s.m.position.z, 0x9fdf3a, 5, 3);
      scene.remove(s.m);
      enemyShots.splice(i, 1);
    }
  }

  // ---- particles
  for(let i = particles.length-1; i >= 0; i--){
    const p = particles[i];
    p.vy -= 13*dt;
    p.m.position.x += p.vx*dt; p.m.position.y += p.vy*dt; p.m.position.z += p.vz*dt;
    p.m.rotation.x += p.rx*dt; p.m.rotation.z += p.rz*dt;
    if(p.m.position.y < 0.06){ p.m.position.y = 0.06; p.vy *= -0.4; p.vx *= 0.7; p.vz *= 0.7; }
    p.life -= dt;
    p.m.scale.setScalar(Math.max(0.01, p.life/p.max) * 1.2);
    if(p.life <= 0){ scene.remove(p.m); particles.splice(i, 1); }
  }

  // ---- explosion flashes
  for(let i = flashes.length-1; i >= 0; i--){
    const f = flashes[i];
    f.life -= dt;
    const t = 1 - f.life/f.max;
    f.m.scale.setScalar(0.5 + t*f.radius);
    f.m.material.opacity = 0.9*(1-t);
    if(f.life <= 0){ scene.remove(f.m); f.m.material.dispose(); flashes.splice(i, 1); }
  }

  // ---- pickups (hearts & ammo boxes)
  for(let i = pickups.length-1; i >= 0; i--){
    const pk = pickups[i];
    pk.t += dt*3;
    pk.sp.position.y = 1 + Math.sin(pk.t)*0.15;
    if(playing && Math.hypot(pk.sp.position.x - player.x, pk.sp.position.z - player.z) < 1.3){
      if(pk.kind === 'ammo'){
        // (the cat cannon reloads only when the cat finishes its nap)
        for(let j=0;j<WEAPONS.length;j++) if(unlocked[j] && WEAPONS[j].maxAmmo && !WEAPONS[j].cat)
          ammo[j] = Math.min(WEAPONS[j].maxAmmo, ammo[j] + Math.ceil(WEAPONS[j].maxAmmo*0.3));
        SFX.reload();
        refreshWeaponBar();
      } else if(pk.kind === 'egg'){
        const E = MAPS[currentMap].egg;
        E.apply();
        showBanner(E.banner);
        SFX.unlock();
        unlockAch('egg');
      } else {
        if(player.hearts < 5){ player.hearts++; } else { score += 25; }
        SFX.heart();
      }
      updateHUD();
      scene.remove(pk.sp); pickups.splice(i, 1);
    }
  }

  // ---- clouds drift
  for(const c of clouds){
    c.position.x += dt*1.2;
    if(c.position.x > 100) c.position.x = -100;
  }
}

// ---- rendering: view-only, derived from the simulated state; always runs
// locally on each client (a networked client keeps this and just feeds it the
// latest state it received).
function renderFrame(dt, now){
  // ---- camera
  if(state === 'menu' || state === 'over'){
    // slow cinematic orbit behind the menu
    const t = now*0.0001;
    camera.position.set(Math.cos(t)*14, 5, Math.sin(t)*14);
    camera.lookAt(0, 1, 0);
  } else {
    camera.rotation.set(pitch, yaw, 0);
    camera.position.set(
      player.x + (shake>0 ? rnd(-shake,shake)*0.3 : 0),
      1.6 + py + Math.sin(bobT)*0.045 + (shake>0 ? rnd(-shake,shake)*0.2 : 0),
      player.z + (shake>0 ? rnd(-shake,shake)*0.3 : 0));
  }
  if(shake > 0) shake = Math.max(0, shake - dt*2);

  // ---- weapon view model animation
  {
    const vm = viewModels[curWeapon];
    if(attackAnim > 0) attackAnim = Math.max(0, attackAnim - dt*4.5);
    const a = Math.sin(attackAnim * Math.PI); // 0→1→0
    const w = WEAPONS[curWeapon];
    if(vm === viewModels[0]){ // fists
      const { fl, fr } = vm.userData;
      fl.position.z = -0.6 - (punchHand===0 ? a*0.4 : 0);
      fr.position.z = -0.6 - (punchHand===1 ? a*0.4 : 0);
    } else if(vm === viewModels[1]){ // bat swing
      vm.rotation.y = -a*1.1;
      vm.rotation.z = a*0.4;
    } else { // gun recoil
      vm.position.z = a*0.14;
    }
    vm.position.y = Math.sin(bobT)*0.012;
  }

  // ---- laser beam visual
  if(beamUntil > now && state === 'playing'){
    const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
    beamMesh.visible = true;
    beamMesh.position.copy(camera.position).addScaledVector(dir, 0.4);
    beamMesh.position.y -= 0.18;
    beamMesh.quaternion.setFromUnitVectors(beamUp, dir);
    beamMesh.scale.set(1, 45, 1);
    beamMesh.material.opacity = 0.5 + 0.3*Math.sin(now*0.05);
  } else beamMesh.visible = false;

  renderer.render(scene, camera);
}
requestAnimationFrame(loop);

// exposed for quick console testing
window.__game = { startGame, addScore, tryJump, startWave, launchCat,
  get state(){ return state; }, get zombies(){ return zombies.length; },
  get py(){ return py; }, get map(){ return currentMap; }, get maps(){ return unlockedMaps; },
  get cats(){ return cats.length; } };
</script>
